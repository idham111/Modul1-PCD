<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}JTK PCD 2024 - NAMA - NIM{% endblock %}</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css"
    />
    <style>
      :root {
        --bg-dark: #0f0f1a;
        --bg-card: rgba(255, 255, 255, 0.05);
        --border-glass: rgba(255, 255, 255, 0.1);
        --accent-blue: #6366f1;
        --accent-purple: #a855f7;
        --accent-cyan: #22d3ee;
        --text-primary: #f1f5f9;
        --text-secondary: #94a3b8;
      }

      * { box-sizing: border-box; }

      body {
        font-family: 'Inter', sans-serif;
        background: linear-gradient(135deg, #0f0f1a 0%, #1a1a2e 40%, #16213e 100%);
        color: var(--text-primary);
        min-height: 100vh;
        overflow-x: hidden;
      }

      /* Animated bg blobs */
      body::before,
      body::after {
        content: '';
        position: fixed;
        border-radius: 50%;
        filter: blur(120px);
        opacity: 0.15;
        z-index: 0;
        pointer-events: none;
      }
      body::before {
        width: 600px; height: 600px;
        background: var(--accent-purple);
        top: -200px; left: -100px;
        animation: blobMove1 20s ease-in-out infinite alternate;
      }
      body::after {
        width: 500px; height: 500px;
        background: var(--accent-cyan);
        bottom: -150px; right: -100px;
        animation: blobMove2 18s ease-in-out infinite alternate;
      }
      @keyframes blobMove1 {
        0%   { transform: translate(0, 0) scale(1); }
        100% { transform: translate(100px, 80px) scale(1.15); }
      }
      @keyframes blobMove2 {
        0%   { transform: translate(0, 0) scale(1); }
        100% { transform: translate(-80px, -60px) scale(1.1); }
      }

      /* Navbar */
      .navbar-glass {
        background: rgba(15, 15, 26, 0.7);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border-bottom: 1px solid var(--border-glass);
        padding: 0.8rem 0;
        position: relative;
        z-index: 10;
      }
      .navbar-glass .navbar-brand {
        font-weight: 700;
        font-size: 1.1rem;
        background: linear-gradient(135deg, var(--accent-blue), var(--accent-cyan));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        letter-spacing: -0.3px;
      }
      .navbar-glass .navbar-brand i {
        -webkit-text-fill-color: var(--accent-cyan);
        margin-right: 6px;
      }

      /* Glass card utility */
      .glass {
        background: var(--bg-card);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border: 1px solid var(--border-glass);
        border-radius: 16px;
        transition: transform 0.3s ease, box-shadow 0.3s ease, border-color 0.3s ease;
      }
      .glass:hover {
        transform: translateY(-4px);
        box-shadow: 0 12px 40px rgba(99, 102, 241, 0.15);
        border-color: rgba(99, 102, 241, 0.3);
      }

      /* Main container */
      .main-container {
        position: relative;
        z-index: 5;
      }

      /* Buttons */
      .btn-glow {
        background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
        border: none;
        color: #fff;
        font-weight: 600;
        padding: 0.6rem 1.8rem;
        border-radius: 12px;
        transition: all 0.3s ease;
        box-shadow: 0 4px 15px rgba(99, 102, 241, 0.3);
      }
      .btn-glow:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 25px rgba(99, 102, 241, 0.5);
        color: #fff;
      }

      .btn-ghost {
        background: transparent;
        border: 1px solid var(--border-glass);
        color: var(--text-secondary);
        font-weight: 500;
        padding: 0.6rem 1.8rem;
        border-radius: 12px;
        transition: all 0.3s ease;
      }
      .btn-ghost:hover {
        background: rgba(255,255,255,0.05);
        color: var(--text-primary);
        border-color: rgba(255,255,255,0.2);
      }

      /* Section titles */
      .section-title {
        font-weight: 700;
        font-size: 1.4rem;
        letter-spacing: -0.5px;
      }
      .section-title .badge-pill {
        font-size: 0.7rem;
        font-weight: 500;
        padding: 4px 10px;
        border-radius: 20px;
        background: rgba(99, 102, 241, 0.15);
        color: var(--accent-blue);
        vertical-align: middle;
        margin-left: 8px;
      }

      /* Fade-in animation */
      .fade-up {
        opacity: 0;
        transform: translateY(20px);
        animation: fadeUp 0.6s ease forwards;
      }
      .fade-up:nth-child(1) { animation-delay: 0.05s; }
      .fade-up:nth-child(2) { animation-delay: 0.15s; }
      .fade-up:nth-child(3) { animation-delay: 0.25s; }
      .fade-up:nth-child(4) { animation-delay: 0.35s; }
      @keyframes fadeUp {
        to { opacity: 1; transform: translateY(0); }
      }

      /* Scrollbar */
      ::-webkit-scrollbar { width: 6px; height: 6px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 3px; }
      ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.25); }

      {% block extra_css %}{% endblock %}
    </style>
  </head>
  <body>
    <div class="container main-container mt-4 pb-5">
      {% block content %}{% endblock %}
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    {% block extra_js %}{% endblock %}
  </body>
</html>
